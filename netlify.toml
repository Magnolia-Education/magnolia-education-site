[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

# Protect the admin with a redirect that still allows the page to load.
# For full password protection, set NETLIFY_AUTH_PASSWORD in Netlify dashboard.
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
