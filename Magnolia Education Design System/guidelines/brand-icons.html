<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 26px 30px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .item { text-align: center; }
  .tile { width: 72px; height: 72px; border-radius: var(--radius-md); background: var(--coral-pale); display: flex; align-items: center; justify-content: center; }
  .tile img { width: 38px; height: 38px; object-fit: contain; }
  .n { font-size: 0.62rem; color: var(--ink-faint); margin-top: 7px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="tile"><img src="../assets/icons/rocket.png" alt="Rocket"></div><div class="n">rocket</div></div>
    <div class="item"><div class="tile"><img src="../assets/icons/strength.png" alt="Strength"></div><div class="n">strength</div></div>
    <div class="item"><div class="tile"><img src="../assets/icons/lightbulb.png" alt="Lightbulb"></div><div class="n">lightbulb</div></div>
    <div class="item"><div class="tile"><img src="../assets/icons/lightning-bolt.png" alt="Lightning"></div><div class="n">lightning</div></div>
    <div class="item"><div class="tile"><img src="../assets/icons/pencil.png" alt="Pencil"></div><div class="n">pencil</div></div>
    <div class="item"><div class="tile"><img src="../assets/icons/a-plus.png" alt="A plus"></div><div class="n">a-plus</div></div>
    <div class="item"><div class="tile"><img src="../assets/icons/speech-bubbles.png" alt="Speech"></div><div class="n">speech</div></div>
    <div class="item"><div class="tile"><img src="../assets/icons/beauty.png" alt="Flower"></div><div class="n">beauty</div></div>
    <div class="item"><div class="tile"><img src="../assets/icons/computer.png" alt="Computer"></div><div class="n">computer</div></div>
  </div>
</body>
</html>
