<!-- @dsCard group="Type" viewport="700x250" name="Display — Cormorant Garamond" subtitle="Warm literary serif, set MEDIUM. Italic coral for emphasis." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 30px 34px; color: var(--navy); }
  .hero { font-family: var(--font-display); font-weight: var(--weight-medium); font-size: 3.1rem; line-height: var(--leading-display); letter-spacing: var(--tracking-display); }
  .hero em { font-style: italic; color: var(--coral); font-size: 0.7em; }
  .t1 { font-family: var(--font-display); font-weight: var(--weight-medium); font-size: 2rem; margin-top: 14px; }
  .meta { font-size: 0.74rem; color: var(--ink-faint); margin-top: 16px; letter-spacing: 0.02em; }
  .meta b { color: var(--ink-soft); font-weight: 600; }
</style>
</head>
<body>
  <div class="hero">Better grades.<br><em>And a better way to get them.</em></div>
  <div class="t1">Everything a student needs to thrive.</div>
  <div class="meta"><b>Cormorant Garamond</b> · weights 400 / 500 / 600 · medium by default · line-height 1.12 · tracking −0.01em</div>
</body>
</html>
