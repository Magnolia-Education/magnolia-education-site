<!-- @dsCard group="Brand" viewport="700x230" name="Illustration library" subtitle="Hand-drawn pastel scenes — the soul of the brand. Always full-color, transparent, generous air." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 22px 26px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .cell { background: var(--gradient-sky); border-radius: var(--radius-md); height: 110px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .cell img { width: 100%; height: 100%; object-fit: contain; transform: scale(1.35); }
  .cap { font-size: 0.62rem; color: var(--ink-faint); text-align: center; margin-top: 6px; }
  .note { font-size: 0.72rem; color: var(--ink-soft); margin-top: 14px; }
</style>
</head>
<body>
  <div class="row">
    <div><div class="cell"><img src="../assets/illustrations/magnolia-tree.png" alt="Magnolia tree"></div><div class="cap">magnolia-tree</div></div>
    <div><div class="cell"><img src="../assets/illustrations/cloud-surfing.png" alt="Cloud surfing"></div><div class="cap">cloud-surfing</div></div>
    <div><div class="cell"><img src="../assets/illustrations/book-tower.png" alt="Book tower"></div><div class="cap">book-tower</div></div>
    <div><div class="cell"><img src="../assets/illustrations/cookie-trophy.png" alt="Cookie trophy"></div><div class="cap">cookie-trophy</div></div>
    <div><div class="cell"><img src="../assets/illustrations/meditation.png" alt="Meditation"></div><div class="cap">meditation</div></div>
    <div><div class="cell"><img src="../assets/illustrations/exam-exhale.png" alt="Exam exhale"></div><div class="cap">exam-exhale</div></div>
  </div>
  <p class="note">13 scenes in <strong>assets/illustrations/</strong> — set on the sky-mist gradient or plain cream, never inside a hard-edged box.</p>
</body>
</html>
