<!-- @dsCard group="Type" viewport="700x170" name="Eyebrow & labels" subtitle="Uppercase coral eyebrows over serif titles — the section signature" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 30px 34px; }
  .eyebrow { font-size: var(--text-xs); font-weight: var(--weight-semibold); letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--coral); margin-bottom: 12px; }
  .title { font-family: var(--font-display); font-weight: var(--weight-medium); font-size: 2rem; color: var(--navy); line-height: 1.15; }
  .meta { font-size: 0.72rem; color: var(--ink-faint); margin-top: 16px; }
  .meta b { color: var(--ink-soft); font-weight: 600; }
</style>
</head>
<body>
  <div class="eyebrow">What We Offer</div>
  <div class="title">Everything a student needs to thrive.</div>
  <div class="meta"><b>Eyebrow:</b> DM Sans · 12px · 600 · uppercase · tracking 0.16em · coral</div>
</body>
</html>
