<!-- @dsCard group="Colors" viewport="700x190" name="Neutrals & ink" subtitle="Warm grounds and the navy-leaning text greys" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 28px 30px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .chip { height: 76px; }
  .meta { padding: 9px 11px 12px; }
  .name { font-size: 0.82rem; font-weight: 600; color: var(--navy); }
  .hex { font-size: 0.72rem; color: var(--ink-soft); margin-top: 1px; }
  .tok { font-size: 0.66rem; color: var(--ink-faint); margin-top: 4px; }
  .b { border: 1px solid var(--line); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw b"><div class="chip" style="background:var(--white)"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div><div class="tok">--white</div></div></div>
    <div class="sw b"><div class="chip" style="background:var(--cream)"></div><div class="meta"><div class="name">Cream</div><div class="hex">#FBF8F2</div><div class="tok">--cream</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#2A2A2A</div><div class="tok">--ink</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-soft)"></div><div class="meta"><div class="name">Ink soft</div><div class="hex">#5A5A6A</div><div class="tok">--ink-soft</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-faint)"></div><div class="meta"><div class="name">Ink faint</div><div class="hex">#8C8C99</div><div class="tok">--ink-faint</div></div></div>
  </div>
</body>
</html>
