<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base — generous whitespace is the brand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--white); padding: 28px 30px; }
  .grid { display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
  .item { text-align: center; }
  .bar { background: var(--coral-pale); border-bottom: 3px solid var(--coral); }
  .v { font-size: 0.7rem; color: var(--navy); font-weight: 600; margin-top: 8px; }
  .t { font-size: 0.62rem; color: var(--ink-faint); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="v">4</div><div class="t">1</div></div>
    <div class="item"><div class="bar" style="width:16px;height:24px"></div><div class="v">8</div><div class="t">2</div></div>
    <div class="item"><div class="bar" style="width:16px;height:32px"></div><div class="v">12</div><div class="t">3</div></div>
    <div class="item"><div class="bar" style="width:16px;height:40px"></div><div class="v">16</div><div class="t">4</div></div>
    <div class="item"><div class="bar" style="width:16px;height:52px"></div><div class="v">24</div><div class="t">6</div></div>
    <div class="item"><div class="bar" style="width:16px;height:68px"></div><div class="v">32</div><div class="t">8</div></div>
    <div class="item"><div class="bar" style="width:16px;height:84px"></div><div class="v">48</div><div class="t">12</div></div>
    <div class="item"><div class="bar" style="width:16px;height:104px"></div><div class="v">64</div><div class="t">16</div></div>
    <div class="item"><div class="bar" style="width:16px;height:124px"></div><div class="v">80</div><div class="t">20</div></div>
  </div>
</body>
</html>
