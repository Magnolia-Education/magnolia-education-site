<!-- @dsCard group="Brand" viewport="700x250" name="Voice & signature" subtitle="Warm, direct, personal — a note from a great teacher. Always signed Rachit." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--coral-pale); padding: 30px 34px; }
  .card { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 26px 30px; }
  .body { font-size: 1.02rem; line-height: var(--leading-body); color: var(--ink); max-width: 560px; }
  .body em { color: var(--coral); font-style: italic; }
  .sig { font-family: var(--font-display); font-style: italic; font-size: 1.6rem; color: var(--navy); margin-top: 16px; }
  .pron { font-size: 0.74rem; color: var(--ink-faint); font-style: italic; margin-top: 2px; }
</style>
</head>
<body>
  <div class="card">
    <p class="body">I started Magnolia because I believe every student can learn math — and more importantly, <em>learn how to learn</em>. I've struggled and I've triumphed. I know the gap, and what it takes to cross it.</p>
    <div class="sig">— Rachit</div>
    <div class="pron">(pronounced Rutch-it, like "Dutch" with an R)</div>
  </div>
</body>
</html>
